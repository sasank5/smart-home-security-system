<!DOCTYPE html>
<html>
<head>
    <title>Smart Security</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 25px;
            width: 420px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .status {
            margin-bottom: 25px;
            color: #22c55e;
        }

        .btn {
            display: block;
            padding: 14px;
            margin: 12px 0;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .green { background: #22c55e; }
        .blue { background: #3b82f6; }
        .orange { background: #f59e0b; }
        .red { background: #ef4444; }

        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #64748b;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🔐 Smart Security</h1>
    <p class="status">● System Active</p>

    <a href="/register" class="btn green">📷 Register Face</a>
    <a href="/camera" class="btn blue">🎥 Live Camera</a>
    <a href="/dashboard" class="btn orange">📊 Dashboard</a>
    <a href="/logout" class="btn red">🚪 Logout</a>

    <footer>AI Surveillance System • Final Year Project</footer>
</div>

</body>
</html>
